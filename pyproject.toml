[project]
name = "prediction-wallet-1"
version = "0.1.0"
description = "Autonomous AI portfolio rebalancing agent"
requires-python = ">=3.13"
dependencies = [
    # Core AI / Agent
    "pydantic-ai>=1.0.10",
    "mcp[cli]>=1.14.1",
    "google-genai>=1.31.0",
    "anthropic>=0.61.0",
    "langgraph>=0.2.0",
    "langchain-anthropic>=0.3.0",
    "langchain-core>=0.3.0",
    # Data
    "yfinance>=0.2.36",
    "pandas>=2.0.0",
    "numpy>=1.26.0",
    # Portfolio math
    "PyPortfolioOpt>=1.5.5",
    "cvxpy>=1.4.0",
    # Reporting
    "reportlab>=4.0.0",
    # Dashboard
    "streamlit>=1.40.0",
    "plotly>=5.18.0",
    # Utilities
    "python-dotenv>=1.0.0",
    "pydantic-settings>=2.0",
    "PyYAML>=6.0",
    "fastapi>=0.135.2",
]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
]
