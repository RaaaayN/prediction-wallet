services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: prediction
      POSTGRES_PASSWORD: prediction
      POSTGRES_DB: prediction_wallet
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prediction -d prediction_wallet"]
      interval: 3s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
