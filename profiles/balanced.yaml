name: balanced
description: "Balanced allocation — equities 50%, bonds 30%, crypto 20%"

initial_capital: 100000.0
drift_threshold: 0.05
kill_switch_drawdown: 0.10
slippage_equities: 0.001
slippage_crypto: 0.005
vol_blend: 0.3              # blend between fixed (0.0) and pure inverse-vol (1.0) sizing

# Per-asset drift thresholds: wider for volatile crypto, tighter for bonds
per_asset_threshold:
  BTC-USD: 0.08
  ETH-USD: 0.08
  TLT: 0.03
  BND: 0.03

target_allocation:
  AAPL: 0.12
  MSFT: 0.12
  GOOGL: 0.09
  AMZN: 0.09
  NVDA: 0.08
  TLT: 0.15
  BND: 0.15
  BTC-USD: 0.12
  ETH-USD: 0.08

# Hierarchical policy rules (#1 policy-as-code)
policy:
  min_confidence: 0.2          # soft-block all trades when agent confidence < 0.2
  stale_data_blocks: false     # stale data logs a warning but does not block execution
  per_ticker_max_fraction:
    BTC-USD: 0.15              # stricter than global 35% cap for volatile crypto
    ETH-USD: 0.10
