name: long_short_equity
description: "Long/short equity hedge fund profile for PM/Risk workflows"

initial_capital: 100000.0
drift_threshold: 0.03
kill_switch_drawdown: 0.10
slippage_equities: 0.001
slippage_crypto: 0.005
vol_blend: 0.25

target_allocation:
  AAPL: 0.0
  MSFT: 0.0
  GOOGL: 0.0
  AMZN: 0.0
  NVDA: 0.0

policy:
  min_confidence: 0.35
  stale_data_blocks: false
  regime_block: false
  gross_exposure_limit: 1.80
  net_exposure_min: 0.10
  net_exposure_max: 0.90
  max_single_name_long: 0.30
  max_single_name_short: 0.20
  max_sector_gross: 0.70
  max_sector_net: 0.45
  conviction_floor: 0.45
  short_squeeze_blocklist:
    - NVDA

hedge_fund:
  universe:
    AAPL:
      sector: tech
      beta: 1.05
      crowded_score: 0.30
      short_squeeze_risk: false
    MSFT:
      sector: tech
      beta: 0.95
      crowded_score: 0.22
      short_squeeze_risk: false
    GOOGL:
      sector: tech
      beta: 1.10
      crowded_score: 0.28
      short_squeeze_risk: false
    AMZN:
      sector: consumer
      beta: 1.15
      crowded_score: 0.35
      short_squeeze_risk: false
    NVDA:
      sector: tech
      beta: 1.45
      crowded_score: 0.78
      short_squeeze_risk: true
  sleeves:
    core_longs:
      max_gross: 1.00
    tactical_longs:
      max_gross: 0.40
    shorts:
      max_gross: 0.60
  conviction_to_size:
    high: 0.12
    medium: 0.08
    low: 0.04
  cash_buffer: 0.10
  default_time_horizon: "1-3 months"
  ideas:
    - idea_id: idea-aapl-quality
      ticker: AAPL
      side: long
      thesis: "High-quality cash flow compounder with resilient services mix."
      catalyst: "Product refresh cycle and services revenue momentum."
      time_horizon: "3-6 months"
      conviction: 0.74
      upside_case: "Multiple expansion on durable margin resilience."
      downside_case: "Consumer slowdown compresses hardware demand."
      invalidation_rule: "Services growth drops below low double digits for two quarters."
      status: investable
      sleeve: core_longs
    - idea_id: idea-msft-defensive-growth
      ticker: MSFT
      side: long
      thesis: "Platform strength and recurring enterprise revenue support defensive growth."
      catalyst: "Cloud bookings and AI monetization updates."
      time_horizon: "3-6 months"
      conviction: 0.69
      upside_case: "Cloud margin durability supports earnings revisions."
      downside_case: "Enterprise spend decelerates faster than expected."
      invalidation_rule: "Azure growth misses internal target for two successive quarters."
      status: portfolio
      sleeve: core_longs
    - idea_id: idea-amzn-margin-repair
      ticker: AMZN
      side: long
      thesis: "Retail efficiency gains and AWS stabilization can re-rate the stock."
      catalyst: "Operating margin expansion in North America retail."
      time_horizon: "1-3 months"
      conviction: 0.58
      upside_case: "Margin surprise forces estimate upgrades."
      downside_case: "Consumer demand weakens and capex remains elevated."
      invalidation_rule: "Retail margin stalls below management guidance."
      status: watchlist
      sleeve: tactical_longs
    - idea_id: idea-googl-ad-risk
      ticker: GOOGL
      side: short
      thesis: "Search monetization faces cyclical ad pressure and rising AI cost intensity."
      catalyst: "Soft digital ad spending and weaker margin commentary."
      time_horizon: "1-3 months"
      conviction: 0.61
      upside_case: "Short works on multiple compression."
      downside_case: "Ad market rebounds and AI monetization offsets costs."
      invalidation_rule: "Ad growth reaccelerates above management long-term trend."
      status: investable
      sleeve: shorts
